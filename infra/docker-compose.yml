version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: lexai_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: lexai_postgres
    environment:
      POSTGRES_USER: lexai
      POSTGRES_PASSWORD: lexai_password
      POSTGRES_DB: lexaidb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexai -d lexaidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexai_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: lexai_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - lexai-net

  grafana:
    image: grafana/grafana:latest
    container_name: lexai_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - lexai-net
    depends_on:
      - prometheus

networks:
  lexai-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data: