name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install ruff mypy pydantic
      - name: Run Ruff
        run: ruff check .
      - name: Run Mypy
        run: mypy api/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lexai
          POSTGRES_PASSWORD: lexai_password
          POSTGRES_DB: lexaidb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Run Pytest
        env:
          DATABASE_URL: postgresql://lexai:lexai_password@localhost:5432/lexaidb_test
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: mock_key
          JWT_SECRET_KEY: mock_secret
          LANGSMITH_API_KEY: mock_key
          ENVIRONMENT: test
        run: pytest tests/

  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t lexai-api:latest -f infra/Dockerfile.api .